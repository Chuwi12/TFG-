<main class="terminal-container">
  <header class="terminal-header">
    <h1 class="serif-title">THE TICKER</h1>
    <span class="status-indicator">● SECURE CONNECTION ESTABLISHED</span>
  </header>

  <section class="chat-log" #scrollMe>
    @for (msg of messages(); track msg.timestamp) {
      <div class="message-row" [class.user-row]="msg.sender === 'user'">
        <div class="message-bubble" [class.user-bubble]="msg.sender === 'user'">
          <!-- Etiqueta estilo consola para el remitente -->
          <span class="sender-label">
            [{{ msg.sender === 'user' ? 'OPERATOR' : 'SYS_AI' }}] 
          </span>
          <!-- Mensaje -->
          <span class="message-text">{{ msg.text }}</span>
        </div>
      </div>
    }
  </section>

  <!-- Interaction Bar (Consola) -->
  <div class="interaction-bar">
    <span class="prompt-symbol">></span>
    <input 
      type="text" 
      class="command-input" 
      placeholder="Awaiting query..." 
      [value]="inputText()" 
      (input)="updateInput($event)"
      (keydown.enter)="sendMessage()"
      autofocus
    >
    <button class="execute-btn" (click)="sendMessage()">EXECUTE</button>
  </div>
</main>
