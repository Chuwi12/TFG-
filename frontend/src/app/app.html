<header class="main-header">
  <div class="container">
    <div class="identity">
      <span class="symbol">◈</span>
      <h1 class="division">Financial Analytics Terminal</h1>
    </div>
    <div class="status">System Status: Operational</div>
  </div>
</header>

<main class="viewport">
  <section class="chat-terminal">
    <div class="terminal-top">
      <h2>Institutional Support Interface</h2>
      <small>dataset: Banking77_v1.0</small>
    </div>

    <div class="log-display">
      @for (msg of messages(); track $index) {
        <div
          class="entry"
          [class.system]="msg.sender === 'system'"
          [class.user]="msg.sender === 'user'"
        >
          <span class="sender-tag">[{{ msg.sender.toUpperCase() }}]</span>
          <p>{{ msg.text }}</p>
        </div>
      }
    </div>

    <form class="interaction-bar" (submit)="$event.preventDefault(); addMessage(userInput)">
      <input
        #userInput
        type="text"
        placeholder="ENTER TRANSACTION OR QUERY..."
        aria-label="Input field"
      />
      <button type="submit">EXECUTE</button>
    </form>
  </section>
</main>

<footer class="main-footer">
  <div class="container">
    <p>&copy; 2026 TFG de Sergio y Javier. Financial advise powered by AI.</p>
  </div>
</footer>

<router-outlet />
