<div class="chat-container">
  <header class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="header-info">
      <h1>Asistente IA (OpenAssistant)</h1>
      <p>Conversación libre en español</p>
    </div>
  </header>

  <main class="chat-box" #chatScroll>
    <div class="message-wrapper" *ngFor="let msg of messages()" [ngClass]="{'user-wrapper': msg.sender === 'user', 'bot-wrapper': msg.sender === 'bot'}">
      
      <div *ngIf="msg.sender === 'bot'" class="avatar bot-avatar-small">🤖</div>
      
      <div class="message-content" [ngClass]="{'user-msg': msg.sender === 'user', 'bot-msg': msg.sender === 'bot'}">
        <div class="text" [innerHTML]="formatText(msg.text)" *ngIf="msg.type === 'text'"></div>
        
        <!-- Loading Animation -->
        <div class="typing-indicator" *ngIf="msg.type === 'loading'">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </main>

  <footer class="chat-input-area">
    <input 
      type="text" 
      [(ngModel)]="userInput" 
      (keyup.enter)="handleTextSubmit()"
      placeholder="Escribe un mensaje..."
      [disabled]="!isApiReady()"
    />
    <button class="send-btn" (click)="handleTextSubmit()" [disabled]="!userInput.trim() || !isApiReady()">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </footer>
</div>
